<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>AI Test</title></head>
<body>
<h2>AI Chat 测试</h2>
<input id="msg" placeholder="输入消息" style="width:300px;padding:8px">
<button onclick="send()">发送</button>
<div id="result" style="margin-top:16px;padding:12px;background:#f5f5f5;white-space:pre-wrap"></div>
<p id="status"></p>

<script>
async function send(){
  const msg = document.getElementById('msg').value.trim()
  if(!msg)return
  const result = document.getElementById('result')
  const status = document.getElementById('status')
  result.textContent = ''
  status.textContent = '发送中...'

  // Login first
  const login = await fetch('/api/v1/auth/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:'admin',password:'admin123'})
  })
  const loginData = await login.json()
  const token = loginData.data.access_token
  status.textContent = '已登录,请求AI...'

  // Call AI
  try{
    const r = await fetch('/api/v1/ai/chat?message='+encodeURIComponent(msg)+'&stream=false',{
      method:'POST',headers:{Authorization:'Bearer '+token}
    })
    status.textContent = '响应: '+r.status
    const d = await r.json()
    result.textContent = (d.code===200 && d.data) ? d.data.reply : JSON.stringify(d)
  }catch(e){
    result.textContent = '错误: '+e.message
    status.textContent = '失败'
  }
}
</script>
</body>
</html>
